<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kurs — LearnPath</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .course-hero {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 3rem 0;
      margin-bottom: 3rem;
    }
    .course-hero h1 { font-size: 2.2rem; margin-bottom: 1rem; }
    .course-meta {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
      color: var(--text-secondary);
    }
    .course-meta span { display: flex; align-items: center; gap: 0.4rem; }
    .lessons-list { display: flex; flex-direction: column; gap: 0.8rem; }
    .lesson-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.2rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lesson-item:hover { border-color: var(--accent); }
    .lesson-item.completed { border-color: var(--success); opacity: 0.8; }
    .lesson-number {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
    }
    .lesson-info { flex: 1; }
    .lesson-title { font-weight: 600; margin-bottom: 0.2rem; }
    .lesson-meta { font-size: 0.85rem; color: var(--text-secondary); }
    .rating-stars {
      display: flex;
      gap: 0.5rem;
      margin: 1rem 0;
    }
    .star-btn {
      font-size: 2rem;
      cursor: pointer;
      color: var(--border);
      transition: color 0.2s;
      background: none;
      border: none;
    }
    .star-btn:hover, .star-btn.active { color: #ffc107; }
    .sidebar {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      position: sticky;
      top: 80px;
    }
    .progress-bar {
      background: var(--border);
      border-radius: 99px;
      height: 8px;
      margin: 0.5rem 0 1rem;
      overflow: hidden;
    }
    .progress-fill {
      background: var(--accent);
      height: 100%;
      border-radius: 99px;
      transition: width 0.3s;
    }
    .two-col {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 2rem;
      align-items: start;
    }
    @media(max-width:900px) {
      .two-col { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="../index.html" class="navbar-logo">🚀 LearnPath</a>
    <ul class="navbar-links">
      <li><a href="../index.html">Bosh sahifa</a></li>
      <li><a href="courses.html">Kurslar</a></li>
      <li><a href="roadmap.html">Roadmap</a></li>
    </ul>
    <div class="navbar-actions" id="navActions"></div>
  </nav>

  <!-- COURSE HERO -->
  <div class="course-hero" id="courseHero">
    <div class="container">
      <div style="color:var(--text-secondary); margin-bottom:0.5rem;">
        <a href="courses.html" style="color:var(--accent);">← Kurslarga qaytish</a>
      </div>
      <div id="heroContent">⏳ Yuklanmoqda...</div>
    </div>
  </div>

  <div class="container">
    <div class="two-col">

      <!-- LESSONS -->
      <div>
        <h2 style="margin-bottom:1.5rem;">📖 Darslar</h2>
        <div class="lessons-list" id="lessonsList">
          <div style="color:var(--text-secondary);">⏳ Yuklanmoqda...</div>
        </div>
      </div>

      <!-- SIDEBAR -->
      <div class="sidebar">
        <h3 style="margin-bottom:1rem;">📊 Progress</h3>
        <div id="progressSection">
          <p style="color:var(--text-secondary); font-size:0.9rem;">
            Progress kuzatish uchun tizimga kiring
          </p>
          <a href="login.html" class="btn btn-primary" style="width:100%; margin-top:1rem; display:block; text-align:center;">
            Kirish
          </a>
        </div>

        <hr style="border-color:var(--border); margin:1.5rem 0;"/>

        <h3 style="margin-bottom:1rem;">⭐ Baho berish</h3>
        <div id="ratingSection">
          <p style="color:var(--text-secondary); font-size:0.9rem;">Baho berish uchun kiring</p>
        </div>
      </div>

    </div>
  </div>

  <footer style="margin-top:4rem;">
    <p>© 2024 LearnPath</p>
  </footer>

  <script src="../js/api.js"></script>
  <script>
    const user = getUser();
    document.getElementById('navActions').innerHTML = user
      ? `<a href="dashboard.html" class="btn btn-outline">Dashboard</a>
         <button class="btn btn-primary" onclick="logout()">Chiqish</button>`
      : `<a href="login.html" class="btn btn-outline">Kirish</a>
         <a href="register.html" class="btn btn-primary">Ro'yxatdan o'tish</a>`;

    const urlParams = new URLSearchParams(window.location.search);
    const courseId = urlParams.get('id');

    if (!courseId) window.location.href = 'courses.html';

    let courseData = null;
    let userProgress = [];

    async function loadCourse() {
      try {
        courseData = await Courses.getById(courseId);

        // Hero
        document.getElementById('heroContent').innerHTML = `
          <h1>${courseData.title}</h1>
          <div class="course-meta">
            <span>🏷️ ${courseData.technology}</span>
            <span class="badge badge-${courseData.level?.toLowerCase()}">${courseData.level}</span>
            <span class="stars">★ ${courseData.rating?.toFixed(1) || '0.0'}</span>
            <span>📖 ${courseData.lessons?.length || 0} ta dars</span>
          </div>
          <p style="color:var(--text-secondary); max-width:600px;">${courseData.description}</p>
        `;

        // Lessons
        if (courseData.lessons && courseData.lessons.length > 0) {
          renderLessons(courseData.lessons);
        } else {
          document.getElementById('lessonsList').innerHTML =
            '<p style="color:var(--text-secondary);">Hali darslar qo\'shilmagan</p>';
        }

        // Progress (agar login bo'lsa)
        if (user) {
          await loadProgress();
          renderRating();
        }

      } catch (e) {
        document.getElementById('heroContent').innerHTML =
          '<p style="color:var(--danger);">Kurs topilmadi</p>';
      }
    }

    function renderLessons(lessons) {
      document.getElementById('lessonsList').innerHTML = lessons.map((l, i) => {
        const completed = userProgress.some(p => p.lessonId === l.id && p.completed);
        return `
          <div class="lesson-item ${completed ? 'completed' : ''}"
               onclick="openLesson(${l.id}, ${courseData.id})">
            <div class="lesson-number">${completed ? '✓' : i + 1}</div>
            <div class="lesson-info">
              <div class="lesson-title">${l.title}</div>
              ${l.videoUrl ? '<div class="lesson-meta">🎥 Video dars</div>' : ''}
            </div>
            <span style="color:var(--text-secondary);">→</span>
          </div>
        `;
      }).join('');
    }

    async function loadProgress() {
      try {
        const progress = await Progress.getUser();
        userProgress = progress.flatMap(p =>
          p.completedLessons > 0 ? [{ courseId: courseData.id, completed: true }] : []
        );

        const total = courseData.lessons?.length || 0;
        const completed = userProgress.filter(p => p.completed).length;
        const percent = total > 0 ? Math.round((completed / total) * 100) : 0;

        document.getElementById('progressSection').innerHTML = `
          <div style="display:flex; justify-content:space-between; margin-bottom:0.3rem;">
            <span style="font-size:0.9rem; color:var(--text-secondary);">Bajarildi</span>
            <span style="font-weight:700;">${percent}%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${percent}%"></div>
          </div>
          <p style="font-size:0.85rem; color:var(--text-secondary);">
            ${completed} / ${total} dars bajarildi
          </p>
        `;
      } catch (e) {}
    }

    function renderRating() {
      document.getElementById('ratingSection').innerHTML = `
        <p style="font-size:0.9rem; color:var(--text-secondary); margin-bottom:0.5rem;">
          Kursni baholang:
        </p>
        <div class="rating-stars" id="ratingStars">
          ${[1,2,3,4,5].map(i =>
            `<button class="star-btn" onclick="submitRating(${i})" id="star${i}">★</button>`
          ).join('')}
        </div>
      `;
    }

    async function submitRating(rating) {
      try {
        await Courses.rate(courseId, rating);
        for (let i = 1; i <= 5; i++) {
          document.getElementById(`star${i}`).classList.toggle('active', i <= rating);
        }
        alert('Bahoyingiz qabul qilindi! ⭐');
      } catch (e) {
        alert(e.message);
      }
    }

    function openLesson(lessonId, cId) {
      if (!user) {
        window.location.href = `login.html`;
        return;
      }
      window.location.href = `lesson.html?id=${lessonId}&courseId=${cId}`;
    }

    loadCourse();
  </script>
</body>
</html>
