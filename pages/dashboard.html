<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — LearnPath</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .dashboard-grid {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 2rem;
      align-items: start;
    }
    .profile-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      text-align: center;
    }
    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      margin: 0 auto 1rem;
    }
    .stat-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
    }
    .stat-number {
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent);
    }
    .stat-label {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-top: 0.3rem;
    }
    .progress-bar {
      background: var(--border);
      border-radius: 99px;
      height: 8px;
      margin: 0.5rem 0;
      overflow: hidden;
    }
    .progress-fill {
      background: var(--accent);
      height: 100%;
      border-radius: 99px;
      transition: width 0.5s;
    }
    .course-progress-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .course-progress-item:hover { border-color: var(--accent); }
    .empty-state {
      text-align: center;
      padding: 4rem;
      color: var(--text-secondary);
    }
    @media(max-width:900px) {
      .dashboard-grid { grid-template-columns: 1fr; }
      .stat-cards { grid-template-columns: repeat(2,1fr); }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="../index.html" class="navbar-logo">🚀 LearnPath</a>
    <ul class="navbar-links">
      <li><a href="../index.html">Bosh sahifa</a></li>
      <li><a href="courses.html">Kurslar</a></li>
      <li><a href="roadmap.html">Roadmap</a></li>
    </ul>
    <div class="navbar-actions">
      <a href="courses.html" class="btn btn-outline">Kurslar</a>
      <button class="btn btn-primary" onclick="logout()">Chiqish</button>
    </div>
  </nav>

  <div class="container" style="padding-top:2rem; padding-bottom:4rem;">

    <h1 style="margin-bottom:2rem;">📊 Dashboard</h1>

    <div class="dashboard-grid">

      <!-- PROFILE SIDEBAR -->
      <div>
        <div class="profile-card">
          <div class="avatar" id="avatarText">Z</div>
          <h2 id="userName">Yuklanmoqda...</h2>
          <p style="color:var(--text-secondary); font-size:0.9rem;" id="userEmail"></p>
          <span class="badge" style="background:var(--bg-secondary); color:var(--accent); margin-top:0.5rem;" id="userRole">user</span>
        </div>

        <div style="margin-top:1rem;">
          <a href="courses.html" class="btn btn-primary" style="width:100%; display:block; text-align:center; margin-bottom:0.8rem;">
            + Yangi kurs boshlash
          </a>
          <a href="roadmap.html" class="btn btn-outline" style="width:100%; display:block; text-align:center;">
            🗺️ Roadmapni ko'rish
          </a>
        </div>
      </div>

      <!-- MAIN CONTENT -->
      <div>
        <!-- STATS -->
        <div class="stat-cards">
          <div class="stat-card">
            <div class="stat-number" id="startedCount">0</div>
            <div class="stat-label">Boshlangan kurslar</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="completedCount">0</div>
            <div class="stat-label">Tugallangan kurslar</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="lessonsCount">0</div>
            <div class="stat-label">O'tilgan darslar</div>
          </div>
        </div>

        <!-- PROGRESS -->
        <h2 style="margin-bottom:1.5rem;">📚 Kurslarim</h2>
        <div id="progressList">
          <div style="text-align:center; padding:2rem; color:var(--text-secondary);">
            ⏳ Yuklanmoqda...
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    const user = getUser();
    if (!user) window.location.href = 'login.html';

    // Profile
    document.getElementById('avatarText').textContent =
      user.username?.charAt(0).toUpperCase() || 'U';
    document.getElementById('userName').textContent = user.username;
    document.getElementById('userEmail').textContent = user.email;
    document.getElementById('userRole').textContent = user.role;

    async function loadDashboard() {
      try {
        const progress = await Progress.getUser();

        const started = progress.length;
        const completed = progress.filter(p =>
          p.completedLessons >= p.totalLessons && p.totalLessons > 0).length;
        const totalLessons = progress.reduce((sum, p) => sum + p.completedLessons, 0);

        document.getElementById('startedCount').textContent = started;
        document.getElementById('completedCount').textContent = completed;
        document.getElementById('lessonsCount').textContent = totalLessons;

        if (progress.length === 0) {
          document.getElementById('progressList').innerHTML = `
            <div class="empty-state">
              <div style="font-size:3rem; margin-bottom:1rem;">📚</div>
              <h3>Hali kurs boshlanmagan</h3>
              <p style="margin:1rem 0;">Birinchi kursingizni boshlang!</p>
              <a href="courses.html" class="btn btn-primary">Kurslarni ko'rish</a>
            </div>
          `;
          return;
        }

        document.getElementById('progressList').innerHTML = progress.map(p => {
          const percent = p.totalLessons > 0
            ? Math.round((p.completedLessons / p.totalLessons) * 100) : 0;
          return `
            <div class="course-progress-item"
                 onclick="window.location.href='course-detail.html?id=${p.course.id}'">
              <div style="display:flex; justify-content:space-between; margin-bottom:0.5rem;">
                <div>
                  <span style="color:var(--accent); font-size:0.85rem;">${p.course.technology}</span>
                  <h3 style="margin-top:0.2rem;">${p.course.title}</h3>
                </div>
                <span style="font-weight:700; color:${percent===100?'var(--success)':'var(--accent)'}">
                  ${percent}%
                </span>
              </div>
              <div class="progress-bar">
                <div class="progress-fill" style="width:${percent}%"></div>
              </div>
              <div style="color:var(--text-secondary); font-size:0.85rem; margin-top:0.3rem;">
                ${p.completedLessons} / ${p.totalLessons} dars bajarildi
                ${percent === 100 ? '🎉' : ''}
              </div>
            </div>
          `;
        }).join('');

      } catch (e) {
        document.getElementById('progressList').innerHTML =
          '<p style="color:var(--danger);">Ma\'lumot yuklanmadi</p>';
      }
    }

    loadDashboard();
  </script>
</body>
</html>
