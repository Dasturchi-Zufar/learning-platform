<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kirish — LearnPath</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
    }
    .auth-box h2 {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }
    .auth-box p {
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }
    .form-group {
      margin-bottom: 1.2rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.4rem;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.8rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 1rem;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .error-msg {
      color: var(--danger);
      font-size: 0.9rem;
      margin-bottom: 1rem;
      display: none;
    }
    .btn-full { width: 100%; padding: 0.9rem; font-size: 1rem; }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="../index.html" class="navbar-logo">🚀 LearnPath</a>
    <ul class="navbar-links">
      <li><a href="../index.html">Bosh sahifa</a></li>
      <li><a href="courses.html">Kurslar</a></li>
      <li><a href="roadmap.html">Roadmap</a></li>
    </ul>
    <div></div>
  </nav>

  <div class="auth-container">
    <div class="auth-box">
      <h2>Xush kelibsiz 👋</h2>
      <p>Akkauntingizga kiring</p>

      <div class="error-msg" id="errorMsg"></div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="sizning@email.com"/>
      </div>
      <div class="form-group">
        <label>Parol</label>
        <input type="password" id="password" placeholder="••••••••"/>
      </div>

      <button class="btn btn-primary btn-full" onclick="handleLogin()" id="loginBtn">
        Kirish
      </button>

      <p style="text-align:center; margin-top:1.5rem; color:var(--text-secondary);">
        Akkaunt yo'qmi?
        <a href="register.html" style="color:var(--accent);">Ro'yxatdan o'ting</a>
      </p>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    async function handleLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const btn = document.getElementById('loginBtn');

      if (!email || !password) {
        errorMsg.textContent = 'Barcha maydonlarni to\'ldiring';
        errorMsg.style.display = 'block';
        return;
      }

      btn.textContent = 'Yuklanmoqda...';
      btn.disabled = true;
      errorMsg.style.display = 'none';

      try {
        const data = await Auth.login({ email, password });
        saveAuth(data.token, data.user);

        if (data.user.role === 'admin') {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'dashboard.html';
        }
      } catch (e) {
        errorMsg.textContent = e.message;
        errorMsg.style.display = 'block';
        btn.textContent = 'Kirish';
        btn.disabled = false;
      }
    }

    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
